name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'package.json 버전과 동일해야 함 (예: 1.2.6)'
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (dist)
        run: npm run build

      - name: Build installer
        run: npx electron-builder --publish never

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILD_OUTPUT: release
        run: node scripts/publish-github-release.js

      - name: Release summary
        run: |
          echo "Desktop release published to GitHub Releases"
          echo "Tag: v$(node -p "require('./package.json').version")"
